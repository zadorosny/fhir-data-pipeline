version: 2
updates:
  - package-ecosystem: pip
    directory: "/etl"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: "/etl"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
