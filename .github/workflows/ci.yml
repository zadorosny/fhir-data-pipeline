name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint (ruff, mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy etl

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: pytest
        run: pytest -m "not integration" --cov=etl/lib --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  docker-build:
    name: Docker build (etl image)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build ETL image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: ./etl
          push: false
          load: true
          tags: fhir-etl:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration smoke (compose up + HAPI)
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Prepare .env from example
        run: |
          cp .env.example .env
          # Fernet key = url-safe base64 de 32 bytes aleatorios; stdlib basta.
          FERNET=$(python -c "import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          sed -i "s|^AIRFLOW__CORE__FERNET_KEY=.*|AIRFLOW__CORE__FERNET_KEY=$FERNET|" .env
          sed -i "s|^AIRFLOW__WEBSERVER__SECRET_KEY=.*|AIRFLOW__WEBSERVER__SECRET_KEY=$(openssl rand -hex 32)|" .env

      - name: Install integration deps
        run: pip install requests pytest

      - name: docker compose up
        run: docker compose --env-file .env up -d --build

      - name: Wait for HAPI + run integration tests
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/fhir/metadata > /dev/null; then
              echo "HAPI ready"; break
            fi
            sleep 5
          done
          pytest -m integration tests/integration -v

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Cleanup
        if: always()
        run: docker compose --env-file .env down -v
