spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/fhir}
    username: ${SPRING_DATASOURCE_USERNAME:fhir}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      hibernate.search.enabled: false
      hibernate.format_sql: false
      hibernate.show_sql: false
  flyway:
    enabled: false

hapi:
  fhir:
    fhir_version: R4
    server_address: http://localhost:8080/fhir
    allow_multiple_delete: true
    allow_cascading_deletes: true
    allow_external_references: true
    enforce_referential_integrity_on_write: true
    enforce_referential_integrity_on_delete: false
    default_encoding: JSON
    default_pretty_print: true
    # Validacao desligada porque os builders em etl/lib/fhir.py declaram
    # `meta.profile = [BRIndividuo-1.0]` (perfil do SUS/RNDS), mas esse
    # StructureDefinition NAO esta carregado no HAPI - HAPI trata perfil
    # desconhecido como erro fatal (VALIDATION_VAL_PROFILE_UNKNOWN_NOT_POLICY)
    # e rejeita todos os POSTs com HTTP 422.
    #
    # Para reabilitar com seguranca: carregar o StructureDefinition do
    # BRIndividuo via /fhir/StructureDefinition no startup do HAPI (volume
    # com NpmPackage ou implementation guide). Acompanhar em docs/security.md.
    validation:
      requests_enabled: false
      responses_enabled: false
    bulk_export_enabled: true
    narrative_enabled: false
