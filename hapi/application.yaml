spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/fhir}
    username: ${SPRING_DATASOURCE_USERNAME:fhir}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      hibernate.search.enabled: false
      hibernate.format_sql: false
      hibernate.show_sql: false
  flyway:
    enabled: false

hapi:
  fhir:
    fhir_version: R4
    server_address: http://localhost:8080/fhir
    allow_multiple_delete: true
    allow_cascading_deletes: true
    allow_external_references: true
    enforce_referential_integrity_on_write: true
    enforce_referential_integrity_on_delete: false
    default_encoding: JSON
    default_pretty_print: true
    # Validacao habilitada para barrar payloads malformados na entrada e
    # detectar regressoes nos builders (etl/lib/fhir.py). Falhas surgem como
    # HTTP 422 - o consumer trata como FHIRError e roteia para a DLQ.
    validation:
      requests_enabled: true
      responses_enabled: true
    bulk_export_enabled: true
    narrative_enabled: false
